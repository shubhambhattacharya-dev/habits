<div class="w-full max-w-md bg-surface-container/60 backdrop-blur-[20px] rounded-xl p-8 border border-outline-variant/15 relative overflow-hidden">
<!-- Radial Glow Top Left -->
<div class="absolute -top-12 -left-12 w-32 h-32 bg-primary-fixed-dim/5 rounded-full blur-2xl pointer-events-none"></div>
<!-- Segmented Control Toggle -->
<div class="flex p-1 bg-surface-container-lowest rounded-lg mb-8" role="tablist">

                        Access

<button aria-selected="false" class="flex-1 py-3 px-4 rounded-lg text-on-surface-variant hover:text-on-surface font-label text-sm font-medium tracking-wider uppercase transition-all" role="tab">
                        Initialize
                    </button>
</div>
<!-- Login Form -->
<form class="space-y-6">
<div class="space-y-1">
<label class="block font-label text-[10px] tracking-widest uppercase text-on-surface-variant" for="email">Neural Identifier (Email)</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant/20 rounded-lg px-4 py-3 text-on-surface placeholder-on-surface-variant/30 focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-all shadow-[0_0_15px_rgba(208,188,255,0)] focus:shadow-[0_0_15px_rgba(208,188,255,0.1)] font-body" id="email" placeholder="operative@synapse.network" type="email"/>
</div>
<div class="space-y-1">
<label class="block font-label text-[10px] tracking-widest uppercase text-on-surface-variant flex justify-between" for="password">
<span>Security Cipher</span>
<a class="text-primary hover:text-primary-container transition-colors underline decoration-primary/30 underline-offset-2" href="#">Override</a>
